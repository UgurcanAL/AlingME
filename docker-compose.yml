# AlignME Development Docker Compose
# Complete development environment with all services
version: '3.8'

networks:
  alignme-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

services:
  # =============================================================================
  # APPLICATION SERVICE
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: alignme-app
    ports:
      - '${PORT:-3000}:3000'
      - '${DEBUG_PORT:-9229}:9229' # Node.js debugging port
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-alignme_dev}
      - DB_USER=${DB_USER:-alignme}
      - DB_PASSWORD=${DB_PASSWORD:-alignme123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production}
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-alignme-uploads-dev}
    volumes:
      - .:/app:cached
      - /app/node_modules
      - ./logs:/app/logs
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alignme-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: npm run dev

  # =============================================================================
  # DATABASE SERVICE
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: alignme-postgres
    environment:
      - POSTGRES_DB=${DB_NAME:-alignme_dev}
      - POSTGRES_USER=${DB_USER:-alignme}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-alignme123}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db_archive/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - alignme-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alignme} -d ${DB_NAME:-alignme_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=1GB

  # =============================================================================
  # REDIS CACHE SERVICE
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: alignme-redis
    volumes:
      - redis_data:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - '${REDIS_PORT:-6379}:6379'
    networks:
      - alignme-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes

  # =============================================================================
  # DEVELOPMENT TOOLS
  # =============================================================================
  # Redis Admin UI
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: alignme-redis-ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - '${REDIS_UI_PORT:-8081}:8081'
    networks:
      - alignme-network
    depends_on:
      - redis
    profiles:
      - tools

  # Database Admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: alignme-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@alignme.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin123}
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - ./config/pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - '${PGADMIN_PORT:-8080}:80'
    networks:
      - alignme-network
    depends_on:
      - postgres
    profiles:
      - tools

  # =============================================================================
  # MONITORING & OBSERVABILITY (Development)
  # =============================================================================
  # Application monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: alignme-prometheus
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    networks:
      - alignme-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: alignme-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
    volumes:
      - ./config/grafana:/etc/grafana/provisioning:ro
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    networks:
      - alignme-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

# =============================================================================
# ADDITIONAL SERVICES FOR SPECIFIC PROFILES
# =============================================================================
